mcs.metadata:
  componentName: Show Prompts
  description: Shared quick prompt buttons used across entry points.
kind: AdaptiveDialog
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent:
    displayName: Show Prompts
    includeInOnSelectIntent: false
    triggerQueries:
      - show prompts
      - quick prompts
      - show options

  actions:
    - kind: SendActivity
      id: sendActivity_sharedPrompts
      activity:
        attachments:
          - kind: AdaptiveCardTemplate
            cardContent: "={ type: \"AdaptiveCard\", '$schema': \"http://adaptivecards.io/schemas/adaptive-card.json\", version: \"1.5\", msteams: { width: \"Full\" }, body: [ { type: \"Container\", style: \"emphasis\", bleed: true, items: [ { type: \"TextBlock\", text: \"Quick prompts\", weight: \"Bolder\", size: \"Medium\" }, { type: \"TextBlock\", text: \"Choose a path to continue.\", wrap: true, spacing: \"Small\" } ] }, { type: \"TextBlock\", text: \"Discovery\", weight: \"Bolder\", color: \"Good\", spacing: \"Medium\" }, { type: \"ActionSet\", actions: [ { type: \"Action.Submit\", title: \"New to ESA?\", data: { msteams: { type: \"imBack\", value: \"NEW_TO_ESA_OVERVIEW_QUICK\" } } }, { type: \"Action.Submit\", title: \"APIs\", data: { msteams: { type: \"imBack\", value: \"API_OVERVIEW_QUICK\" } } }, { type: \"Action.Submit\", title: \"Architecture\", data: { msteams: { type: \"imBack\", value: \"ARCHITECTURE_OVERVIEW_QUICK\" } } }, { type: \"Action.Submit\", title: \"Availability\", data: { msteams: { type: \"imBack\", value: \"AVAILABILITY_OVERVIEW_QUICK\" } } } ] }, { type: \"TextBlock\", text: \"Commercial\", weight: \"Bolder\", color: \"Accent\", spacing: \"Medium\", separator: true }, { type: \"ActionSet\", actions: [ { type: \"Action.Submit\", title: \"Marketing\", data: { msteams: { type: \"imBack\", value: \"MARKETING_OVERVIEW_QUICK\" } } }, { type: \"Action.Submit\", title: \"Tenders\", data: { msteams: { type: \"imBack\", value: \"TENDERS_OVERVIEW_QUICK\" } } }, { type: \"Action.Submit\", title: \"Competitors\", data: { msteams: { type: \"imBack\", value: \"COMPETITORS_OVERVIEW_QUICK\" } } } ], spacing: \"Small\" }, { type: \"TextBlock\", text: \"Help\", weight: \"Bolder\", color: \"Warning\", spacing: \"Medium\", separator: true }, { type: \"ActionSet\", actions: [ { type: \"Action.Submit\", title: \"Contacts\", data: { msteams: { type: \"imBack\", value: \"Escalate\" } } }, { type: \"Action.Submit\", title: \"Send message\", data: { msteams: { type: \"imBack\", value: \"Escalate\" } } }, { type: \"Action.Submit\", title: \"Reset\", data: { msteams: { type: \"imBack\", value: \"Reset\" } } } ], spacing: \"Small\" } ] }"
