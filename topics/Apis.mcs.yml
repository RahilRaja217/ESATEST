mcs.metadata:
  componentName: APIs
  description: This topic handles common API summary questions with a narrower retrieval prompt.
kind: AdaptiveDialog
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent:
    displayName: APIs
    includeInOnSelectIntent: false
    triggerQueries:
      - Summarise API's
      - Summarise APIs
      - Summarise the APIs
      - Tell me about the APIs
      - What APIs are available
      - What are the APIs

  actions:
    - kind: ConditionGroup
      id: api_overview_fast_path
      conditions:
        - id: is_overview_prompt
          condition: =Or(StartsWith(Lower(System.Activity.Text), "api_overview"), StartsWith(Lower(System.Activity.Text), "api_overview_quick"), StartsWith(Lower(System.Activity.Text), "apis"), StartsWith(Lower(System.Activity.Text), "provide a brief api overview"), StartsWith(Lower(System.Activity.Text), "please provide a brief api overview"), StartsWith(Lower(System.Activity.Text), "can you provide a brief api overview"), StartsWith(Lower(System.Activity.Text), "brief api overview"), StartsWith(Lower(System.Activity.Text), "api overview"), StartsWith(Lower(System.Activity.Text), "what apis are available"), StartsWith(Lower(System.Activity.Text), "what are the apis"), StartsWith(Lower(System.Activity.Text), "tell me about the apis"), StartsWith(Lower(System.Activity.Text), "summarise apis"), StartsWith(Lower(System.Activity.Text), "summarise the apis"), StartsWith(Lower(System.Activity.Text), "summarise api's"))
          actions:
            - kind: SearchAndSummarizeContent
              id: search_content_compact_fast
              variable: Topic.Answer
              userInput: =System.Activity.Text
              fileSearchDataSource:
                searchFilesMode:
                  kind: SearchSpecificFiles
                  files:
                    - crc1d_agentB3vfwx.file.ESA_API_Summary_Compact.md_QM0

              generatorInput: "Use only the compact file evidence for this response. Provide a deterministic, concise API overview for a first-click quick prompt. Keep the response short, grounded, and practical. Do not ask follow-up questions and do not add extra suggestions."
              responseConfidence: 0.8

            - kind: ConditionGroup
              id: has_compact_fast_answer_conditions
              conditions:
                - id: has_compact_fast_answer
                  condition: =!IsBlank(Topic.Answer)
                  actions:
                    - kind: EndDialog
                      id: endDialog_apiOverviewFast
                      clearTopicQueue: true

              elseActions:
                - kind: SendActivity
                  id: send_compact_fast_fallback
                  activity: I could not generate the compact overview for that request.

                - kind: EndDialog
                  id: endDialog_apiOverviewFastFallback
                  clearTopicQueue: true

    - kind: SearchAndSummarizeContent
      id: search_content_compact
      variable: Topic.Answer
      userInput: =System.Activity.Text
      fileSearchDataSource:
        searchFilesMode:
          kind: SearchSpecificFiles
          files:
            - crc1d_agentB3vfwx.file.ESA_API_Summary_Compact.md_QM0

      generatorInput: "Provide a concise, grounded response for Sage embedded services APIs for users learning about the ESA API landscape. Prioritize clear orientation: what each API area covers, how capabilities relate, and key terminology. Include implementation detail only when the user explicitly asks for build or delivery guidance. Keep the response short and direct. Use Sage tone of voice: clear, confident, practical, and customer-focused, with plain business language. Do not ask follow-up questions or add extra suggestions unless the user asks for them."
      responseConfidence: 0.6

    - kind: ConditionGroup
      id: has_compact_answer_conditions
      conditions:
        - id: has_compact_answer
          condition: =!IsBlank(Topic.Answer)
          actions:
            - kind: EndDialog
              id: end_topic_compact
              clearTopicQueue: true

      elseActions:
        - kind: SearchAndSummarizeContent
          id: search_content_broad
          variable: Topic.Answer
          userInput: =System.Activity.Text
          fileSearchDataSource:
            searchFilesMode:
              kind: SearchSpecificFiles
              files:
                - crc1d_agentB3vfwx.file.ESA_API_Summary_Compact.md_QM0

          knowledgeSources:
            kind: SearchSpecificKnowledgeSources
            knowledgeSources:
              - crc1d_agentB3vfwx.topic.httpsinternaldevelopersagecomdevxexplore_VDzuyrkvYRYf2ogT8Y0LN
              - crc1d_agentB3vfwx.topic.httpsdevelopersagecomembeddedservices__9K91NJnP0gXvSlPUzesU

          generatorInput: "Provide a concise, grounded response for Sage embedded services APIs for users learning about the ESA API landscape. Prioritize clear orientation: what each API area covers, how capabilities relate, and key terminology. Include implementation detail only when the user explicitly asks for build or delivery guidance. Keep the response short and direct. Use Sage tone of voice: clear, confident, practical, and customer-focused, with plain business language. Do not ask follow-up questions or add extra suggestions unless the user asks for them."
          responseConfidence: 0.6

    - kind: ConditionGroup
      id: has_answer_conditions
      conditions:
        - id: has_answer
          condition: =!IsBlank(Topic.Answer)
          actions:
            - kind: EndDialog
              id: end_topic
              clearTopicQueue: true

      elseActions:
        - kind: ReplaceDialog
          id: replaceDialog_fallback
          dialog: crc1d_agentB3vfwx.topic.Fallback