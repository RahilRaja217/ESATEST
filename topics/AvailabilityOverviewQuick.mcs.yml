mcs.metadata:
  componentName: Availability Overview Quick
  description: Deterministic quick overview response for availability overview prompts.
kind: AdaptiveDialog
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent:
    displayName: Availability Overview Quick
    includeInOnSelectIntent: false
    triggerQueries:
      - AVAILABILITY_OVERVIEW
      - AVAILABILITY_OVERVIEW_QUICK
      - Provide a brief overview on capability and availability
      - Please provide a brief overview on capability and availability
      - Can you provide a brief overview on capability and availability
      - Brief capability and availability overview
      - Availability overview
    suggestedActions:
      - "New to ESA?"
      - "APIs"
      - "Architecture"
      - "Availability"
      - "Marketing"
      - "Tenders"
      - "Competitors"
      - "Contacts"
      - "Send message"
      - "Reset"

  actions:
    - kind: BeginDialog
      id: beginDialog_availability
      dialog: crc1d_agentB3vfwx.topic.Availability

    - kind: EndDialog
      id: end_topic
      clearTopicQueue: true

