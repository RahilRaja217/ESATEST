mcs.metadata:
  componentName: New to Embedded Services
  description: This topic helps users who are new to ESA understand where to start and what the platform offers.
kind: AdaptiveDialog
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent:
    displayName: New to Embedded Services
    includeInOnSelectIntent: false
    triggerQueries:
      - I'm new to embedded services. Where should I start
      - I'm new to ESA
      - I'm new to Sage embedded services
      - Where should I start
      - Help me get started
      - First steps with ESA
      - How do I start with embedded services

  actions:
    - kind: ConditionGroup
      id: new_to_esa_overview_fast_path
      conditions:
        - id: is_new_to_esa_overview_prompt
          condition: =Or(StartsWith(Lower(System.Activity.Text), "new_to_esa_overview"), StartsWith(Lower(System.Activity.Text), "new_to_esa_overview_quick"), StartsWith(Lower(System.Activity.Text), "new to esa?"), StartsWith(Lower(System.Activity.Text), "new to esa"), StartsWith(Lower(System.Activity.Text), "i'm new to embedded"), StartsWith(Lower(System.Activity.Text), "i'm new to esa"), StartsWith(Lower(System.Activity.Text), "i'm new to embedded services. where should i start"), StartsWith(Lower(System.Activity.Text), "where should i start"), StartsWith(Lower(System.Activity.Text), "help me get started"), StartsWith(Lower(System.Activity.Text), "first steps with esa"))
          actions:
            - kind: SendActivity
              id: sendActivity_newToEsaOverviewFast
              activity: |-
                Welcome to Sage Embedded Services. Here is a quick orientation to help you get started.

                | Learning path | What you will understand | Best for |
                | --- | --- | --- |
                | Architecture | How ESA is designed and how pieces fit together | Technical leads, architects, integration teams |
                | APIs | What capabilities are exposed and how to call them | Developers, technical delivery |
                | Availability | What is ready now and what is coming | Product managers, commercial teams, pre-sales |
                | Marketing | The value proposition and competitive positioning | Sales teams, executives, partners |
                | Tenders | How to answer RFI/RFP questions with evidence | Pre-sales, bid teams |

                ESA helps partners embed finance capabilities (accounting, expense, payroll, carbon) directly into applications.

                Suggested questions:
                - Give me a brief API overview.
                - Provide a brief architectural overview.
                - What is live in the UK?

            - kind: EndDialog
              id: endDialog_newToEsaOverviewFast
              clearTopicQueue: true

    - kind: SearchAndSummarizeContent
      id: search_content_compact
      variable: Topic.Answer
      userInput: =System.Activity.Text
      fileSearchDataSource:
        searchFilesMode:
          kind: SearchSpecificFiles
          files:
            - crc1d_agentB3vfwx.file.ESA_NewToEmbeddedServices_Summary_Compact.md_N01
            - crc1d_agentB3vfwx.file.ESA_NewToEmbeddedServices_Summary_Compact.md_feI

      knowledgeSources:
        kind: SearchSpecificKnowledgeSources

      applyModelKnowledgeSetting: false
      generatorInput: "Provide a concise onboarding summary for users new to Sage Embedded Services. Explain what ESA does, where to start learning, and recommend a learning path based on their role. Keep the response short, welcoming, and practical. Use Sage tone of voice: clear, confident, practical, and customer-focused. Do not ask follow-up questions or add extra suggestions unless the user asks for them."
      responseConfidence: 0.6

    - kind: ConditionGroup
      id: has_compact_answer_conditions
      conditions:
        - id: has_compact_answer
          condition: =!IsBlank(Topic.Answer)
          actions:
            - kind: EndDialog
              id: end_topic_compact
              clearTopicQueue: true

      elseActions:
        - kind: SearchAndSummarizeContent
          id: search_content_broad
          variable: Topic.Answer
          userInput: =System.Activity.Text
          fileSearchDataSource:
            searchFilesMode:
              kind: SearchSpecificFiles
              files:
                - crc1d_agentB3vfwx.file.ESA_NewToEmbeddedServices_Summary_Compact.md_feI

          knowledgeSources:
            kind: SearchSpecificKnowledgeSources
            knowledgeSources:
              - crc1d_agentB3vfwx.topic.httpssagecom_3Ijpcu6hjQsZdnjvUo6d7
              - crc1d_agentB3vfwx.topic.httpsdevelopersagecomembeddedservices__9K91NJnP0gXvSlPUzesU

          applyModelKnowledgeSetting: false
          generatorInput: "Provide a concise onboarding summary for users new to Sage Embedded Services. Explain what ESA does, where to start learning, and recommend a learning path based on their role. Keep the response short, welcoming, and practical. Use Sage tone of voice: clear, confident, practical, and customer-focused. Do not ask follow-up questions or add extra suggestions unless the user asks for them."
          responseConfidence: 0.6

    - kind: ConditionGroup
      id: has_answer_conditions
      conditions:
        - id: has_answer
          condition: =!IsBlank(Topic.Answer)
          actions:
            - kind: EndDialog
              id: end_topic
              clearTopicQueue: true

      elseActions:
        - kind: ReplaceDialog
          id: replaceDialog_fallback
          dialog: crc1d_agentB3vfwx.topic.Fallback