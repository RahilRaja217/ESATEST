mcs.metadata:
  componentName: Availability UK Internal
  description: This topic handles direct questions about what is internal in the UK for Sage embedded services.
kind: AdaptiveDialog
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent:
    displayName: Availability UK Internal
    includeInOnSelectIntent: false
    triggerQueries:
      - __legacy_disabled_do_not_use__

  actions:
    - kind: SearchAndSummarizeContent
      id: search_uk_internal_content
      variable: Topic.Answer
      userInput: =System.Activity.Text
      responseConfidence: 0.2
      generatorInput: "Apply the Availability Orchestration Contract exactly. For region-targeted or status-targeted multi-item lists (for example 'what is live in <region>' or 'what is externally marketable in <region>'), output exactly one markdown table and nothing else. Required header: | Capability family | Capability | Sub-capability | Status | Region |. Keep Capability family, Status, and Region populated on every row; include Capability or Sub-capability where applicable. Do not include introductory text, semicolon lists, summary lines, or follow-up questions before or after the table. User question: {System.Activity.Text}"

    - kind: ConditionGroup
      id: answer_conditions
      conditions:
        - id: has_answer
          condition: =And(!IsBlank(Topic.Answer), !StartsWith(Lower(Topic.Answer), "no information was found"))
          actions:
            - kind: EndDialog
              id: end_topic
              clearTopicQueue: true

      elseActions:
        - kind: SendActivity
          id: send_deterministic_recovery
          activity:
            text:
              - I couldn't find enough grounded information to answer that reliably. Try phrasing as: what is internal in the UK?

        - kind: EndDialog
          id: end_topic_after_recovery
          clearTopicQueue: true