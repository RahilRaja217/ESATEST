mcs.metadata:
  componentName: Marketing
  description: This topic handles common marketing proposition questions with a narrower retrieval prompt.
kind: AdaptiveDialog
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent:
    displayName: Marketing
    includeInOnSelectIntent: false
    triggerQueries:
      - Summarise the marketing proposition
      - Tell me about the marketing proposition
      - What is the marketing proposition
      - Explain the marketing proposition
      - Summarise the value proposition
      - What is the value proposition
      - Provide a brief marketing overview
      - Marketing overview

  actions:
    - kind: ConditionGroup
      id: marketing_overview_fast_path
      conditions:
        - id: is_marketing_overview_prompt
          condition: =Or(StartsWith(Lower(System.Activity.Text), "marketing_overview"), StartsWith(Lower(System.Activity.Text), "marketing_overview_quick"), StartsWith(Lower(System.Activity.Text), "marketing"), StartsWith(Lower(System.Activity.Text), "provide a brief marketing overview"), StartsWith(Lower(System.Activity.Text), "provide brief marketing"), StartsWith(Lower(System.Activity.Text), "please provide a brief marketing overview"), StartsWith(Lower(System.Activity.Text), "can you provide a brief marketing overview"), StartsWith(Lower(System.Activity.Text), "brief marketing overview"), StartsWith(Lower(System.Activity.Text), "marketing overview"), StartsWith(Lower(System.Activity.Text), "provide a brief overview on marketing"), StartsWith(Lower(System.Activity.Text), "summarise the marketing proposition"), StartsWith(Lower(System.Activity.Text), "tell me about the marketing proposition"), StartsWith(Lower(System.Activity.Text), "what is the marketing proposition"), StartsWith(Lower(System.Activity.Text), "summarise the value proposition"), StartsWith(Lower(System.Activity.Text), "what is the value proposition"))
          actions:
            - kind: SendActivity
              id: sendActivity_marketingOverviewFast
              activity: |-
                Sage Embedded Services marketing proposition centers on helping partners embed finance capabilities directly into their user journeys so they can deliver customer value faster, with lower delivery effort and stronger operational confidence.

                | Marketing pillar | What it emphasizes | Example question |
                | --- | --- | --- |
                | Business value | Clear outcomes: speed, efficiency, and growth support | What business outcomes does ESA help partners achieve? |
                | Product differentiation | Embedded finance experiences integrated into partner products | How does ESA help partners differentiate their offer? |
                | Capability breadth | Coverage across accounting, expense, carbon, and payroll | Which capability areas can partners bring to market? |
                | Trust and scale | Reliable operations, governance, and enterprise-ready controls | Why is ESA positioned as a trusted embedded platform? |

                Ask me anything about a specific pillar, or ask for positioning language for a specific audience.

            - kind: EndDialog
              id: endDialog_marketingOverviewFast
              clearTopicQueue: true

    - kind: SearchAndSummarizeContent
      id: search_content_compact
      variable: Topic.Answer
      userInput: =System.Activity.Text
      fileSearchDataSource:
        searchFilesMode:
          kind: SearchSpecificFiles
          files:
            - crc1d_agentB3vfwx.file.ESA_Marketing_Summary_Compact.md_M01

      knowledgeSources:
        kind: SearchSpecificKnowledgeSources

      generatorInput: "Provide a concise summary of the marketing proposition for Sage embedded services. Focus on value proposition, benefits, and positioning. Keep the response short and direct. Use Sage tone of voice: clear, confident, practical, and customer-focused, with plain business language. Do not ask follow-up questions or add extra suggestions unless the user asks for them."
      responseConfidence: 0.6

    - kind: ConditionGroup
      id: has_compact_answer_conditions
      conditions:
        - id: has_compact_answer
          condition: =!IsBlank(Topic.Answer)
          actions:
            - kind: EndDialog
              id: end_topic_compact
              clearTopicQueue: true

      elseActions:
        - kind: SearchAndSummarizeContent
          id: search_content_broad
          variable: Topic.Answer
          userInput: =System.Activity.Text
          fileSearchDataSource:
            searchFilesMode:
              kind: SearchSpecificFiles
              files:
                - crc1d_agentB3vfwx.file.ESA_Marketing_Summary_Compact.md_M01

          knowledgeSources:
            kind: SearchSpecificKnowledgeSources
            knowledgeSources:
              - crc1d_agentB3vfwx.topic.SageEmbeddedServicesPlaybookFY26Q2pptx_e_BfHURNSfxe5SCCjEknK
              - crc1d_agentB3vfwx.topic.ESPropositionandPackagingpptx_Ttnb8VcfMTGou1GXlpITR

          generatorInput: "Provide a concise summary of the marketing proposition for Sage embedded services. Focus on value proposition, benefits, and positioning. Keep the response short and direct. Use Sage tone of voice: clear, confident, practical, and customer-focused, with plain business language. Do not ask follow-up questions or add extra suggestions unless the user asks for them."
          responseConfidence: 0.6

    - kind: ConditionGroup
      id: has_answer_conditions
      conditions:
        - id: has_answer
          condition: =!IsBlank(Topic.Answer)
          actions:
            - kind: EndDialog
              id: end_topic
              clearTopicQueue: true

      elseActions:
        - kind: ReplaceDialog
          id: replaceDialog_fallback
          dialog: crc1d_agentB3vfwx.topic.Fallback