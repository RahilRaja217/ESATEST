mcs.metadata:
  componentName: Marketing
  description: This topic handles common marketing proposition questions with a narrower retrieval prompt.
kind: AdaptiveDialog
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent:
    displayName: Marketing
    includeInOnSelectIntent: false
    triggerQueries:
      - Summarise the marketing proposition
      - Tell me about the marketing proposition
      - What is the marketing proposition
      - Explain the marketing proposition
      - Summarise the value proposition
      - What is the value proposition
      - Provide a brief marketing overview
      - Marketing overview

  actions:
    - kind: ConditionGroup
      id: marketing_overview_fast_path
      conditions:
        - id: is_marketing_overview_prompt
          condition: =Or(StartsWith(Lower(System.Activity.Text), "marketing_overview"), StartsWith(Lower(System.Activity.Text), "marketing_overview_quick"), StartsWith(Lower(System.Activity.Text), "marketing"), StartsWith(Lower(System.Activity.Text), "provide a brief marketing overview"), StartsWith(Lower(System.Activity.Text), "please provide a brief marketing overview"), StartsWith(Lower(System.Activity.Text), "can you provide a brief marketing overview"), StartsWith(Lower(System.Activity.Text), "brief marketing overview"), StartsWith(Lower(System.Activity.Text), "marketing overview"), StartsWith(Lower(System.Activity.Text), "provide a brief overview on marketing"), StartsWith(Lower(System.Activity.Text), "summarise the marketing proposition"), StartsWith(Lower(System.Activity.Text), "tell me about the marketing proposition"), StartsWith(Lower(System.Activity.Text), "what is the marketing proposition"), StartsWith(Lower(System.Activity.Text), "summarise the value proposition"), StartsWith(Lower(System.Activity.Text), "what is the value proposition"))
          actions:
            - kind: SearchAndSummarizeContent
              id: search_content_compact_fast
              variable: Topic.Answer
              userInput: =System.Activity.Text
              fileSearchDataSource:
                searchFilesMode:
                  kind: SearchSpecificFiles
                  files:
                    - crc1d_agentB3vfwx.file.ESA_Marketing_Summary_Compact.md_M01

              generatorInput: "Use only the compact file evidence for this response. Provide a deterministic, concise marketing overview for a first-click quick prompt. Keep the response short, grounded, and practical. Do not ask follow-up questions and do not add extra suggestions."
              responseConfidence: 0.8

            - kind: ConditionGroup
              id: has_compact_fast_answer_conditions
              conditions:
                - id: has_compact_fast_answer
                  condition: =!IsBlank(Topic.Answer)
                  actions:
                    - kind: EndDialog
                      id: endDialog_marketingOverviewFast
                      clearTopicQueue: true

              elseActions:
                - kind: SendActivity
                  id: send_compact_fast_fallback
                  activity: I could not generate the compact overview for that request.

                - kind: EndDialog
                  id: endDialog_marketingOverviewFastFallback
                  clearTopicQueue: true

    - kind: SearchAndSummarizeContent
      id: search_content_compact
      variable: Topic.Answer
      userInput: =System.Activity.Text
      fileSearchDataSource:
        searchFilesMode:
          kind: SearchSpecificFiles
          files:
            - crc1d_agentB3vfwx.file.ESA_Marketing_Summary_Compact.md_M01

      knowledgeSources:
        kind: SearchSpecificKnowledgeSources

      generatorInput: "Provide a concise summary of the marketing proposition for Sage embedded services. Focus on value proposition, benefits, and positioning. Keep the response short and direct. Use Sage tone of voice: clear, confident, practical, and customer-focused, with plain business language. Do not ask follow-up questions or add extra suggestions unless the user asks for them."
      responseConfidence: 0.6

    - kind: ConditionGroup
      id: has_compact_answer_conditions
      conditions:
        - id: has_compact_answer
          condition: =!IsBlank(Topic.Answer)
          actions:
            - kind: EndDialog
              id: end_topic_compact
              clearTopicQueue: true

      elseActions:
        - kind: SearchAndSummarizeContent
          id: search_content_broad
          variable: Topic.Answer
          userInput: =System.Activity.Text
          fileSearchDataSource:
            searchFilesMode:
              kind: SearchSpecificFiles
              files:
                - crc1d_agentB3vfwx.file.ESA_Marketing_Summary_Compact.md_M01

          knowledgeSources:
            kind: SearchSpecificKnowledgeSources
            knowledgeSources:
              - crc1d_agentB3vfwx.topic.SageEmbeddedServicesPlaybookFY26Q2pptx_e_BfHURNSfxe5SCCjEknK
              - crc1d_agentB3vfwx.topic.ESPropositionandPackagingpptx_Ttnb8VcfMTGou1GXlpITR

          generatorInput: "Provide a concise summary of the marketing proposition for Sage embedded services. Focus on value proposition, benefits, and positioning. Keep the response short and direct. Use Sage tone of voice: clear, confident, practical, and customer-focused, with plain business language. Do not ask follow-up questions or add extra suggestions unless the user asks for them."
          responseConfidence: 0.6

    - kind: ConditionGroup
      id: has_answer_conditions
      conditions:
        - id: has_answer
          condition: =!IsBlank(Topic.Answer)
          actions:
            - kind: EndDialog
              id: end_topic
              clearTopicQueue: true

      elseActions:
        - kind: ReplaceDialog
          id: replaceDialog_fallback
          dialog: crc1d_agentB3vfwx.topic.Fallback