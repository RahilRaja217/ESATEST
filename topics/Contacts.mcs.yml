mcs.metadata:
  componentName: Contacts
  description: This topic handles questions about contacts and points of contact.
kind: AdaptiveDialog
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent:
    displayName: Contacts
    includeInOnSelectIntent: false
    triggerQueries:
      - Contacts
      - Who are the contacts
      - Show me the contacts
      - Who should I contact
      - Who is the contact for
      - Find a contact
      - Contact directory
      - Who do I speak to
      - Who do I talk to
      - Who reports to
      - Show me ES contacts
      - Contacts overview

  actions:
    - kind: ConditionGroup
      id: contacts_overview_fast_path
      conditions:
        - id: is_contacts_overview_prompt
          condition: =Or(StartsWith(Lower(System.Activity.Text), "contacts_overview_quick"), StartsWith(Lower(System.Activity.Text), "provide a brief contacts overview"), StartsWith(Lower(System.Activity.Text), "please provide a brief contacts overview"), StartsWith(Lower(System.Activity.Text), "can you provide a brief contacts overview"), StartsWith(Lower(System.Activity.Text), "brief contacts overview"), StartsWith(Lower(System.Activity.Text), "contacts overview"), StartsWith(Lower(System.Activity.Text), "who are the contacts"), StartsWith(Lower(System.Activity.Text), "show me the contacts"), StartsWith(Lower(System.Activity.Text), "contacts"))
          actions:
            - kind: SendActivity
              id: sendActivity_contactsOverviewFast
              activity: |-
                The Embedded Services contacts directory covers 52 people across ES and adjacent teams.

                | Area | Key contacts | ES |
                | --- | --- | --- |
                | Leadership | Gordon Stuart (SVP), Jonathan Cowan (EVP) | Yes / No |
                | Continuous Innovation | Sean O'Keefe, Terrence Trench, Kayleigh Henderson | Yes |
                | Partner Success | Tara Ellis, Mags Fulker | Yes |
                | Developer Services | James Coleman, Darren Liddell, Rahil Raja | Yes |
                | Support & Escalation | Richard Lord, Ify Okafor, Himesh Patel | Yes |
                | Marketing | Phil Catt, Kate Butler, Avril Crowley, Erin Roesch | Yes |
                | Product (adjacent) | Adrian Malpass, Joanne Pringle, Nicholas Timon | No |

                ES = Yes means the person is employed within Embedded Services. ES = No means they are in an adjacent or partner team.

                Follow-up questions you could ask:
                - Who should I contact for partner success?
                - Show me ES = Yes contacts only.
                - Who reports to Sean O'Keefe?
                - Who is the best contact for product marketing?
                - Show me all support engineers and their reporting lines.

            - kind: EndDialog
              id: endDialog_contactsOverviewFast
              clearTopicQueue: true

    - kind: SearchAndSummarizeContent
      id: search_content_compact
      variable: Topic.Answer
      userInput: =System.Activity.Text
      fileSearchDataSource:
        searchFilesMode:
          kind: SearchSpecificFiles
          files:
            - crc1d_agentB3vfwx.file.ESA_Contacts_Summary_Compact.md_C01

      knowledgeSources:
        kind: SearchSpecificKnowledgeSources

      generatorInput: "Provide a concise, grounded answer about Embedded Services contacts using the contacts compact file as the only source. Prioritize direct contact identification: who to contact, their registered role, AKA role, reporting line, and ES status. If multiple matches exist, present the best primary contact first, then 1-3 alternatives. If the request is broad, summarize by relevant role group and ask one narrowing follow-up question. Keep the response short, practical, and evidence-based. Use Sage tone of voice: clear, confident, practical, customer-focused, plain business language. End with one brief follow-up question."
      responseConfidence: 0.6

    - kind: ConditionGroup
      id: has_compact_answer_conditions
      conditions:
        - id: has_compact_answer
          condition: =!IsBlank(Topic.Answer)
          actions:
            - kind: EndDialog
              id: end_topic_compact
              clearTopicQueue: true

      elseActions:
        - kind: SearchAndSummarizeContent
          id: search_content_broad
          variable: Topic.Answer
          userInput: =System.Activity.Text
          fileSearchDataSource:
            searchFilesMode:
              kind: SearchSpecificFiles
              files:
                - crc1d_agentB3vfwx.file.ESA_Contacts_Summary_Compact.md_C01

          knowledgeSources:
            kind: SearchSpecificKnowledgeSources
            knowledgeSources:
              - crc1d_agentB3vfwx.topic.SumUpxlsx_eqAg0t5sbJ1HJYqzMrJEs
              - crc1d_agentB3vfwx.topic.HSBCMBFxlsx_dbNEdy2mDZ8wEMJmK49SZ
              - crc1d_agentB3vfwx.topic.HSBCxlsx_Pc953eIPoM1ITnowwWdLL
              - crc1d_agentB3vfwx.topic.Monzoxlsx_ddRBCgfVx0RbrXQqjAcmq

          generatorInput: "Provide a concise, grounded answer about Embedded Services contacts. Prioritize direct contact identification: who to contact, their registered role, AKA role, reporting line, and ES status. If multiple matches exist, present the best primary contact first, then 1-3 alternatives. If the request is broad, summarize by relevant role group and ask one narrowing follow-up question. Keep the response short, practical, and evidence-based. Use Sage tone of voice: clear, confident, practical, customer-focused, plain business language. End with one brief follow-up question."
          responseConfidence: 0.6

    - kind: ConditionGroup
      id: has_answer_conditions
      conditions:
        - id: has_answer
          condition: =!IsBlank(Topic.Answer)
          actions:
            - kind: EndDialog
              id: end_topic
              clearTopicQueue: true

      elseActions:
        - kind: ReplaceDialog
          id: replaceDialog_fallback
          dialog: crc1d_agentB3vfwx.topic.Fallback
