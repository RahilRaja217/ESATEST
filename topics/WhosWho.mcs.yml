mcs.metadata:
  componentName: Who's Who
  description: This topic handles questions about contacts and points of contact.
kind: AdaptiveDialog
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent:
    displayName: Who's Who
    includeInOnSelectIntent: false
    triggerQueries:
      - __whoswho_temporarily_disabled__

  actions:
    - kind: SearchAndSummarizeContent
      id: search_content
      variable: Topic.Answer
      userInput: Summarise the relevant contacts for Sage embedded services and identify who to contact for the requested area.
      responseConfidence: 0.6
      generatorInput: Provide a concise answer about the relevant contacts for Sage embedded services using ES_Tender_Contacts.xlsx as the primary source. Focus on who the person is, their role, and when they should be contacted, based only on the evidence in that source. Keep the response short and direct. Use Sage tone of voice: clear, confident, practical, and customer-focused, with plain business language. End with one brief follow-up question that offers to go deeper into a relevant aspect.

    - kind: ConditionGroup
      id: has_answer_conditions
      conditions:
        - id: has_answer
          condition: =!IsBlank(Topic.Answer)
          actions:
            - kind: EndDialog
              id: end_topic
              clearTopicQueue: true

      elseActions:
        - kind: ReplaceDialog
          id: replaceDialog_fallback
          dialog: crc1d_agentB3vfwx.topic.Fallback