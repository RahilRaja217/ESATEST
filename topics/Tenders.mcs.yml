mcs.metadata:
  componentName: Tenders
  description: This topic handles questions about how ESA can support answering tender, RFI, and RFP questions.
kind: AdaptiveDialog
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent:
    displayName: Tenders
    includeInOnSelectIntent: false
    triggerQueries:
      - Provide a brief summary on how ESA can support answering tender questions
      - How can ESA support tenders
      - Tell me about tender support
      - How does ESA help with RFI and RFP
      - What tender support does ESA provide
      - Summarise ESA tender support
      - Can ESA help with tender questions

  actions:
    - kind: ConditionGroup
      id: tenders_overview_fast_path
      conditions:
        - id: is_tenders_overview_prompt
          condition: =Or(StartsWith(Lower(System.Activity.Text), "tenders_overview"), StartsWith(Lower(System.Activity.Text), "tenders_overview_quick"), StartsWith(Lower(System.Activity.Text), "tenders"), StartsWith(Lower(System.Activity.Text), "provide a brief summary on how esa can support answering tender questions"), StartsWith(Lower(System.Activity.Text), "how can esa support tenders"), StartsWith(Lower(System.Activity.Text), "tell me about tender support"), StartsWith(Lower(System.Activity.Text), "how does esa help with rfi and rfp"), StartsWith(Lower(System.Activity.Text), "what tender support does esa provide"), StartsWith(Lower(System.Activity.Text), "summarise esa tender support"))
          actions:
            - kind: SearchAndSummarizeContent
              id: search_content_compact_fast
              variable: Topic.Answer
              userInput: =System.Activity.Text
              fileSearchDataSource:
                searchFilesMode:
                  kind: SearchSpecificFiles
                  files:
                    - crc1d_agentB3vfwx.file.ESA_Tenders_Summary_Compact.md_T01
                    - crc1d_agentB3vfwx.file.ESA_Tenders_Summary_Compact.md_qaa

              generatorInput: "Use only the compact file evidence for this response. Provide a deterministic, concise tenders overview for a first-click quick prompt. Keep the response short, grounded, and practical. Do not ask follow-up questions and do not add extra suggestions."
              responseConfidence: 0.8

            - kind: ConditionGroup
              id: has_compact_fast_answer_conditions
              conditions:
                - id: has_compact_fast_answer
                  condition: =!IsBlank(Topic.Answer)
                  actions:
                    - kind: EndDialog
                      id: endDialog_tendersOverviewFast
                      clearTopicQueue: true

              elseActions:
                - kind: SendActivity
                  id: send_compact_fast_fallback
                  activity: I could not generate the compact overview for that request.

                - kind: EndDialog
                  id: endDialog_tendersOverviewFastFallback
                  clearTopicQueue: true

    - kind: SearchAndSummarizeContent
      id: search_content_compact
      variable: Topic.Answer
      userInput: =System.Activity.Text
      fileSearchDataSource:
        searchFilesMode:
          kind: SearchSpecificFiles
          files:
            - crc1d_agentB3vfwx.file.ESA_Tenders_Summary_Compact.md_T01
            - crc1d_agentB3vfwx.file.ESA_Tenders_Summary_Compact.md_qaa

      knowledgeSources:
        kind: SearchSpecificKnowledgeSources

      generatorInput: "Provide a concise summary of how Sage Embedded Services can support answering tender, RFI, and RFP questions. Focus on capability evidence, availability data, proposition content, and reference examples. Keep the response short and direct. Use Sage tone of voice: clear, confident, practical, and customer-focused, with plain business language. Do not ask follow-up questions or add extra suggestions unless the user asks for them."
      responseConfidence: 0.6

    - kind: ConditionGroup
      id: has_compact_answer_conditions
      conditions:
        - id: has_compact_answer
          condition: =!IsBlank(Topic.Answer)
          actions:
            - kind: EndDialog
              id: end_topic_compact
              clearTopicQueue: true

      elseActions:
        - kind: SearchAndSummarizeContent
          id: search_content_broad
          variable: Topic.Answer
          userInput: =System.Activity.Text
          fileSearchDataSource:
            searchFilesMode:
              kind: SearchSpecificFiles
              files:
                - crc1d_agentB3vfwx.file.ESA_Tenders_Summary_Compact.md_T01
                - crc1d_agentB3vfwx.file.ESA_Tenders_Summary_Compact.md_qaa

          knowledgeSources:
            kind: SearchSpecificKnowledgeSources
            knowledgeSources:
              - crc1d_agentB3vfwx.topic.SumUpxlsx_eqAg0t5sbJ1HJYqzMrJEs
              - crc1d_agentB3vfwx.topic.HSBCMBFxlsx_dbNEdy2mDZ8wEMJmK49SZ
              - crc1d_agentB3vfwx.topic.HSBCxlsx_Pc953eIPoM1ITnowwWdLL
              - crc1d_agentB3vfwx.topic.Monzoxlsx_ddRBCgfVx0RbrXQqjAcmq

          generatorInput: "Provide a concise summary of how Sage Embedded Services can support answering tender, RFI, and RFP questions. Focus on capability evidence, availability data, proposition content, and reference examples. Keep the response short and direct. Use Sage tone of voice: clear, confident, practical, and customer-focused, with plain business language. Do not ask follow-up questions or add extra suggestions unless the user asks for them."
          responseConfidence: 0.6

    - kind: ConditionGroup
      id: has_answer_conditions
      conditions:
        - id: has_answer
          condition: =!IsBlank(Topic.Answer)
          actions:
            - kind: EndDialog
              id: end_topic
              clearTopicQueue: true

      elseActions:
        - kind: ReplaceDialog
          id: replaceDialog_fallback
          dialog: crc1d_agentB3vfwx.topic.Fallback