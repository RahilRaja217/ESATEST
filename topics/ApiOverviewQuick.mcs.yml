mcs.metadata:
  componentName: API Overview Quick
  description: Deterministic quick overview response for API overview prompts.
kind: AdaptiveDialog
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent:
    displayName: API Overview Quick
    includeInOnSelectIntent: false
    triggerQueries:
      - API_OVERVIEW
      - API_OVERVIEW_QUICK
      - Provide a brief API overview
      - Please provide a brief API overview
      - Can you provide a brief API overview
      - Brief API overview
      - API overview
    suggestedActions:
      - "New to ESA?"
      - "APIs"
      - "Architecture"
      - "Availability"
      - "Marketing"
      - "Tenders"
      - "Competitors"
      - "Contacts"
      - "Send message"
      - "Reset"

  actions:
    - kind: BeginDialog
      id: beginDialog_apis
      dialog: crc1d_agentB3vfwx.topic.Apis

    - kind: EndDialog
      id: end_topic
      clearTopicQueue: true

