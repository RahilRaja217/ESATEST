mcs.metadata:
  componentName: Marketing Overview Quick
  description: Deterministic quick overview response for marketing overview prompts.
kind: AdaptiveDialog
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent:
    displayName: Marketing Overview Quick
    includeInOnSelectIntent: false
    triggerQueries:
      - MARKETING_OVERVIEW
      - MARKETING_OVERVIEW_QUICK
      - Provide a brief marketing overview
      - Please provide a brief marketing overview
      - Can you provide a brief marketing overview
      - Brief marketing overview
      - Marketing overview
      - Provide a brief overview on marketing
    suggestedActions:
      - "New to ESA?"
      - "APIs"
      - "Architecture"
      - "Availability"
      - "Marketing"
      - "Tenders"
      - "Competitors"
      - "Contacts"
      - "Send message"
      - "Reset"

  actions:
    - kind: BeginDialog
      id: beginDialog_marketing
      dialog: crc1d_agentB3vfwx.topic.Marketing

    - kind: EndDialog
      id: end_topic
      clearTopicQueue: true


