mcs.metadata:
  componentName: Contacts Overview Quick
  description: Deterministic quick overview response for contacts overview prompts.
kind: AdaptiveDialog
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent:
    displayName: Contacts Overview Quick
    includeInOnSelectIntent: false
    triggerQueries:
      - CONTACTS_OVERVIEW
      - CONTACTS_OVERVIEW_QUICK
      - Provide a brief contacts overview
      - Please provide a brief contacts overview
      - Can you provide a brief contacts overview
      - Brief contacts overview
      - Contacts overview
      - Who are the contacts
      - Show me the contacts
    suggestedActions:
      - "New to ESA?"
      - "APIs"
      - "Architecture"
      - "Availability"
      - "Marketing"
      - "Tenders"
      - "Competitors"
      - "Contacts"
      - "Send message"
      - "Reset"

  actions:
    - kind: BeginDialog
      id: beginDialog_contacts
      dialog: crc1d_agentB3vfwx.topic.Contacts

    - kind: EndDialog
      id: end_topic
      clearTopicQueue: true
