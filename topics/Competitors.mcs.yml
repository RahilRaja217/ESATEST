mcs.metadata:
  componentName: Competitors
  description: This topic handles common competitor strategy questions with a narrower retrieval prompt.
kind: AdaptiveDialog
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent:
    displayName: Competitors
    includeInOnSelectIntent: false
    triggerQueries:
      - Summarise the competitive strategy
      - Tell me about the competitive strategy
      - What is the competitive strategy
      - Explain the competitive strategy
      - Who are the competitors
      - Summarise competitors

  actions:
    - kind: ConditionGroup
      id: competitors_overview_fast_path
      conditions:
        - id: is_competitors_overview_prompt
          condition: =Or(StartsWith(Lower(System.Activity.Text), "competitors_overview_quick"), StartsWith(Lower(System.Activity.Text), "provide a brief overview on competitors"), StartsWith(Lower(System.Activity.Text), "please provide a brief overview on competitors"), StartsWith(Lower(System.Activity.Text), "can you provide a brief overview on competitors"), StartsWith(Lower(System.Activity.Text), "brief competitors overview"), StartsWith(Lower(System.Activity.Text), "summarise the competitive strategy"), StartsWith(Lower(System.Activity.Text), "tell me about the competitive strategy"), StartsWith(Lower(System.Activity.Text), "what is the competitive strategy"), StartsWith(Lower(System.Activity.Text), "summarise competitors"), StartsWith(Lower(System.Activity.Text), "who are the competitors"))
          actions:
            - kind: SendActivity
              id: sendActivity_competitorsOverviewFast
              activity: |-
                Sage Embedded Services has clear competitive differentiation in embedded finance, where partners can integrate multiple finance domains directly into their applications.

                | Competitive area | What differentiates ESA | Typical learning question |
                | --- | --- | --- |
                | Embedded-first design | Purpose-built for embedding, not adapted from standalone products | Why is an embedded-first platform different? |
                | Multi-domain coverage | Accounting, expense, carbon, and payroll in one platform | How does breadth of domains create advantage? |
                | Partner success model | Focus on partner outcomes, not just feature lists | What does ESA prioritize in partner engagements? |
                | Operational trust | Enterprise-grade security, compliance, and reliability | Why can partners trust ESA at scale? |

                If useful, I can explore any competitive area with real-world positioning examples and customer use cases.

                Follow-up questions you could ask:
                - How does ESA differentiate from point solutions in accounting or expense?
                - What are common competitor comparison points?
                - Do you want positioning language for a specific scenario?

            - kind: EndDialog
              id: endDialog_competitorsOverviewFast
              clearTopicQueue: true

    - kind: SearchAndSummarizeContent
      id: search_content_compact
      variable: Topic.Answer
      userInput: =System.Activity.Text
      fileSearchDataSource:
        searchFilesMode:
          kind: SearchSpecificFiles
          files:
            - crc1d_agentB3vfwx.file.ESA_Competitors_Summary_Compact.md_C01

      generatorInput: "Provide a concise summary of the competitive strategy for Sage embedded services. Focus on differentiation, positioning, and competitive themes. Keep the response short and direct. Use Sage tone of voice: clear, confident, practical, and customer-focused, with plain business language. End with one brief follow-up question that offers to go deeper into a relevant aspect."
      responseConfidence: 0.6

    - kind: ConditionGroup
      id: has_compact_answer_conditions
      knowledgeSources:
        kind: SearchSpecificKnowledgeSources
        knowledgeSources:
          - Value: crc1d_agentB3vfwx.topic.ESPropositionandPackagingpptx_Ttnb8VcfMTGou1GXlpITR

          - Value: crc1d_agentB3vfwx.topic.httpssagecom_3Ijpcu6hjQsZdnjvUo6d7

          - Value: crc1d_agentB3vfwx.topic.httpsdevelopersagecomembeddedservices__9K91NJnP0gXvSlPUzesU

          - Value:

      conditions:
        - id: has_compact_answer
          condition: =!IsBlank(Topic.Answer)
          actions:
            - kind: EndDialog
              id: end_topic_compact
              clearTopicQueue: true

      elseActions:
        - kind: SearchAndSummarizeContent
          id: search_content_broad
          variable: Topic.Answer
          userInput: =System.Activity.Text
          fileSearchDataSource:
            searchFilesMode:
              kind: SearchSpecificFiles
              files:
                - crc1d_agentB3vfwx.file.ESA_Competitors_Summary_Compact.md_C01

          knowledgeSources:
            kind: SearchSpecificKnowledgeSources

    - kind: ConditionGroup
      id: has_answer_conditions
      conditions:
        - id: has_answer
          condition: =!IsBlank(Topic.Answer)
          actions:
            - kind: EndDialog
              id: end_topic
              clearTopicQueue: true

      elseActions:
        - kind: ReplaceDialog
          id: replaceDialog_fallback
          dialog: crc1d_agentB3vfwx.topic.Fallback