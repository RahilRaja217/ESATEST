mcs.metadata:
  componentName: Conversational boosting
  description: Create generative answers from knowledge sources.
kind: AdaptiveDialog
beginDialog:
  kind: OnUnknownIntent
  id: main
  priority: -1
  actions:
    - kind: ConditionGroup
      id: architecture_overview_global_guard
      conditions:
        - id: is_architecture_overview_prompt
          condition: =Or(StartsWith(Lower(System.Activity.Text), "architecture_overview_quick"), StartsWith(Lower(System.Activity.Text), "provide a brief architectural overview"), StartsWith(Lower(System.Activity.Text), "please provide a brief architectural overview"), StartsWith(Lower(System.Activity.Text), "can you provide a brief architectural overview"), StartsWith(Lower(System.Activity.Text), "brief architectural overview"), StartsWith(Lower(System.Activity.Text), "architecture overview"))
          actions:
            - kind: BeginDialog
              id: beginDialog_architectureOverviewQuick
              dialog: crc1d_agentB3vfwx.topic.ArchitectureOverviewQuick

            - kind: EndDialog
              id: endDialog_afterArchitectureOverviewQuick
              clearTopicQueue: true

    - kind: ConditionGroup
      id: api_overview_global_guard
      conditions:
        - id: is_api_overview_prompt
          condition: =Or(StartsWith(Lower(System.Activity.Text), "api_overview_quick"), StartsWith(Lower(System.Activity.Text), "provide a brief api overview"), StartsWith(Lower(System.Activity.Text), "please provide a brief api overview"), StartsWith(Lower(System.Activity.Text), "can you provide a brief api overview"), StartsWith(Lower(System.Activity.Text), "brief api overview"), StartsWith(Lower(System.Activity.Text), "api overview"))
          actions:
            - kind: BeginDialog
              id: beginDialog_apiOverviewQuick
              dialog: crc1d_agentB3vfwx.topic.ApiOverviewQuick

            - kind: EndDialog
              id: endDialog_afterApiOverviewQuick
              clearTopicQueue: true

    - kind: ConditionGroup
      id: marketing_overview_global_guard
      conditions:
        - id: is_marketing_overview_prompt
          condition: =Or(StartsWith(Lower(System.Activity.Text), "marketing_overview_quick"), StartsWith(Lower(System.Activity.Text), "provide a brief marketing overview"), StartsWith(Lower(System.Activity.Text), "please provide a brief marketing overview"), StartsWith(Lower(System.Activity.Text), "can you provide a brief marketing overview"), StartsWith(Lower(System.Activity.Text), "brief marketing overview"), StartsWith(Lower(System.Activity.Text), "marketing overview"), StartsWith(Lower(System.Activity.Text), "provide a brief overview on marketing"))
          actions:
            - kind: BeginDialog
              id: beginDialog_marketingOverviewQuick
              dialog: crc1d_agentB3vfwx.topic.MarketingOverviewQuick

            - kind: EndDialog
              id: endDialog_afterMarketingOverviewQuick
              clearTopicQueue: true

    - kind: ConditionGroup
      id: availability_overview_global_guard
      conditions:
        - id: is_availability_overview_prompt
          condition: =Or(StartsWith(Lower(System.Activity.Text), "availability_overview_quick"), StartsWith(Lower(System.Activity.Text), "provide a brief overview on capability and availability"), StartsWith(Lower(System.Activity.Text), "please provide a brief overview on capability and availability"), StartsWith(Lower(System.Activity.Text), "can you provide a brief overview on capability and availability"), StartsWith(Lower(System.Activity.Text), "brief capability and availability overview"), StartsWith(Lower(System.Activity.Text), "availability overview"))
          actions:
            - kind: BeginDialog
              id: beginDialog_availabilityOverviewQuick
              dialog: crc1d_agentB3vfwx.topic.AvailabilityOverviewQuick

            - kind: EndDialog
              id: endDialog_afterAvailabilityOverviewQuick
              clearTopicQueue: true

    - kind: ConditionGroup
      id: competitors_overview_global_guard
      conditions:
        - id: is_competitors_overview_prompt
          condition: =Or(StartsWith(Lower(System.Activity.Text), "competitors_overview_quick"), StartsWith(Lower(System.Activity.Text), "provide a brief overview on competitors"), StartsWith(Lower(System.Activity.Text), "please provide a brief overview on competitors"), StartsWith(Lower(System.Activity.Text), "can you provide a brief overview on competitors"), StartsWith(Lower(System.Activity.Text), "brief competitors overview"))
          actions:
            - kind: BeginDialog
              id: beginDialog_competitorsOverviewQuick
              dialog: crc1d_agentB3vfwx.topic.CompetitorsOverviewQuick

            - kind: EndDialog
              id: endDialog_afterCompetitorsOverviewQuick
              clearTopicQueue: true

    - kind: ConditionGroup
      id: tenders_overview_global_guard
      conditions:
        - id: is_tenders_overview_prompt
          condition: =Or(StartsWith(Lower(System.Activity.Text), "tenders_overview_quick"), StartsWith(Lower(System.Activity.Text), "provide a brief summary on how esa can support answering tender questions"), StartsWith(Lower(System.Activity.Text), "please provide a brief summary on how esa can support answering tender questions"), StartsWith(Lower(System.Activity.Text), "can you provide a brief summary on how esa can support answering tender questions"), StartsWith(Lower(System.Activity.Text), "brief tenders overview"))
          actions:
            - kind: BeginDialog
              id: beginDialog_tendersOverviewQuick
              dialog: crc1d_agentB3vfwx.topic.TendersOverviewQuick

            - kind: EndDialog
              id: endDialog_afterTendersOverviewQuick
              clearTopicQueue: true

    - kind: SearchAndSummarizeContent
      id: hWDUzp
      variable: Topic.GroundedAnswer
      userInput: =System.Activity.Text
      fileSearchDataSource:
        searchFilesMode:
          kind: DoNotSearchFiles

      knowledgeSources:
        kind: SearchSpecificKnowledgeSources

      generatorInput: "Apply the Availability Orchestration Contract for availability questions, and use standard grounded-answer behavior for other ESA questions. For broad availability list requests (sub-capabilities, capabilities, capability families, regions), return exactly three sections in this order with exact headings: Live, Externally Marketable, Internal. Do not include parentheses in headings. Never output labels like Live (Externally Marketable) or Live (Internal). Use Availability status only for grouping and labels, and ignore Capability status unless explicitly asked. For capability families, assign each family to exactly one primary status using precedence Live > Externally Marketable > Internal and do not repeat families across sections. For every capability or sub-capability listed, include its capability family. For any region-targeted or status-targeted multi-item list (for example 'what is live in <region>' or 'what is externally marketable in <region>'), output exactly one markdown table and nothing else. Required header: | Capability family | Capability | Sub-capability | Status | Region |. Keep Capability family, Status, and Region populated on every row; include Capability or Sub-capability where applicable. Do not include introductory text, semicolon lists, summary lines, or follow-up questions before or after the table. If the user asks a broad question like 'what about sub-capabilities' and does not name a specific sub-capability, return a broad grouped list across all sub-capabilities, not a single-item breakdown. For any named sub-capability regional answer, read the Sub-capability Regional Status Index entry first, then validate with Detailed Availability Records and list every matching region. Never state that explicit records are missing for regions when explicit rows exist. Do not include citation markers. User question: {System.Activity.Text}"
      responseConfidence: 0.5

    - kind: ConditionGroup
      id: grounded_answer_conditions
      conditions:
        - id: has_grounded_answer
          condition: =And(!IsBlank(Topic.GroundedAnswer), !StartsWith(Lower(Topic.GroundedAnswer), "no information was found"))
          actions:
            - kind: EndDialog
              id: end_topic_grounded
              clearTopicQueue: true

      elseActions:
        - kind: SearchAndSummarizeContent
          id: search_generative_fallback
          variable: Topic.GenerativeAnswer
          userInput: =System.Activity.Text
          responseConfidence: 0.2
          generatorInput: "Provide a best-effort answer using the Availability Orchestration Contract for availability questions. Use Availability status only for grouping and labels; ignore Capability status unless explicitly asked. Never output labels like Live (Externally Marketable) or Live (Internal). For every capability or sub-capability listed, include its capability family. For any region-targeted or status-targeted multi-item list (for example 'what is live in <region>' or 'what is externally marketable in <region>'), output exactly one markdown table and nothing else. Required header: | Capability family | Capability | Sub-capability | Status | Region |. Keep Capability family, Status, and Region populated on every row; include Capability or Sub-capability where applicable. Do not include introductory text, semicolon lists, summary lines, or follow-up questions before or after the table. For named sub-capability regional answers, use the Sub-capability Regional Status Index entry first, then verify against explicit Detailed Availability Records rows before listing regions, and do not claim missing explicit records when rows exist. If evidence is partial, start with 'Based on available records'. Never output citation markers or the phrase 'No information was found that could help answer this.' Keep the answer short and practical. User question: {System.Activity.Text}"

        - kind: ConditionGroup
          id: generative_answer_conditions
          conditions:
            - id: has_generative_answer
              condition: =And(!IsBlank(Topic.GenerativeAnswer), !StartsWith(Lower(Topic.GenerativeAnswer), "no information was found"))
              actions:
                - kind: EndDialog
                  id: end_topic_generative
                  clearTopicQueue: true

          elseActions:
            - kind: SendActivity
              id: send_deterministic_recovery
              activity:
                text:
                  - I couldn't find enough grounded information to answer that reliably. Try capability + status phrasing, for example: Where is Invoicing live? or In which regions is Tax Filing externally marketable?

            - kind: EndDialog
              id: end_topic_after_recovery
              clearTopicQueue: true