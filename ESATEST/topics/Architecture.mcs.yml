mcs.metadata:
  componentName: Architecture
  description: This topic handles common architecture questions with a narrower retrieval prompt.
kind: AdaptiveDialog
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent:
    displayName: Architecture
    includeInOnSelectIntent: false
    triggerQueries:
      - Summarise what architecture is used
      - Summarise the architecture
      - Tell me about the architecture
      - What architecture is used
      - Explain the architecture
      - How is it architected

  actions:
    - kind: SearchAndSummarizeContent
      id: search_content
      variable: Topic.Answer
      userInput: Summarise the architecture used by Sage embedded services.
      responseConfidence: 0.6
      generatorInput: Provide a concise summary of the Sage embedded services architecture. Focus on the high-level design, platform components, and integration approach. Keep the response short and direct. Use Sage tone of voice: clear, confident, practical, and customer-focused, with plain business language. End with one brief follow-up question that offers to go deeper into a relevant aspect.

    - kind: ConditionGroup
      id: has_answer_conditions
      conditions:
        - id: has_answer
          condition: =!IsBlank(Topic.Answer)
          actions:
            - kind: EndDialog
              id: end_topic
              clearTopicQueue: true

      elseActions:
        - kind: ReplaceDialog
          id: replaceDialog_fallback
          dialog: crc1d_agentB3vfwx.topic.Fallback