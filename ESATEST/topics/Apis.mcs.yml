mcs.metadata:
  componentName: APIs
  description: This topic handles common API summary questions with a narrower retrieval prompt.
kind: AdaptiveDialog
beginDialog:
  kind: OnRecognizedIntent
  id: main
  intent:
    displayName: APIs
    includeInOnSelectIntent: false
    triggerQueries:
      - Summarise API's
      - Summarise APIs
      - Summarise the APIs
      - Tell me about the APIs
      - What APIs are available
      - What are the APIs

  actions:
    - kind: SearchAndSummarizeContent
      id: search_content
      variable: Topic.Answer
      userInput: Summarise the Sage embedded services APIs.
      responseConfidence: 0.6
      generatorInput: Provide a concise summary of the Sage embedded services APIs. Focus only on API capabilities, integration patterns, and key implementation details. Keep the response short and direct. Use Sage tone of voice: clear, confident, practical, and customer-focused, with plain business language. End with one brief follow-up question that offers to go deeper into a relevant aspect.

    - kind: ConditionGroup
      id: has_answer_conditions
      conditions:
        - id: has_answer
          condition: =!IsBlank(Topic.Answer)
          actions:
            - kind: EndDialog
              id: end_topic
              clearTopicQueue: true

      elseActions:
        - kind: ReplaceDialog
          id: replaceDialog_fallback
          dialog: crc1d_agentB3vfwx.topic.Fallback